<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>蔚为科技标准企业 Logo 702x180</title>
    <style>
      :root {
        --logo-blue: #2f66ea;
        --logo-ink: #101010;
      }

      * {
        box-sizing: border-box;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        background: #f3f4f6;
      }

      .logo-canvas {
        display: flex;
        width: 702px;
        height: 180px;
        align-items: center;
        justify-content: center;
        gap: 44px;
        overflow: hidden;
        background: #ffffff;
      }

      .logo-mark {
        position: relative;
        width: 138px;
        height: 138px;
        overflow: hidden;
        flex: 0 0 auto;
      }

      .logo-mark img {
        position: absolute;
        top: -20px;
        left: -28px;
        width: 176px;
        height: 176px;
        max-width: none;
        display: block;
      }

      .logo-name {
        color: var(--logo-ink);
        font-family:
          "Source Han Sans SC",
          "Noto Sans CJK SC",
          "Noto Sans SC",
          "PingFang SC",
          "Microsoft YaHei",
          sans-serif;
        font-size: 76px;
        font-weight: 760;
        letter-spacing: 7px;
        line-height: 1;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <main class="logo-canvas" aria-label="蔚为科技标准企业 Logo">
      <figure class="logo-mark" aria-hidden="true">
        <img src="weiwei-logo-white-bg.png" alt="" />
      </figure>
      <strong class="logo-name">蔚为科技</strong>
    </main>
  </body>
</html>
